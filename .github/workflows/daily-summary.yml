name: Daily Horizon Summary

on:
  schedule:
    - cron: '0 9 * * *' # Запуск каждый день в 9 утра по UTC
  workflow_dispatch: # Кнопка ручного запуска

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Run Horizon
        run: uv run horizon --hours 24
        env:
          NANOGPT_API_KEY: ${{ secrets.NANOGPT_API_KEY }}

      - name: Find Latest Russian Summary
        id: find_file
        run: |
          # Ищем последний файл, заканчивающийся на -ru.md
          LATEST_FILE=$(ls data/summaries/*-ru.md | tail -n 1)
          if [ -n "$LATEST_FILE" ]; then
            echo "file_path=$LATEST_FILE" >> $GITHUB_OUTPUT
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Send to Telegram
        if: steps.find_file.outputs.found == 'true'
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          document: ${{ steps.find_file.outputs.file_path }}
          message: |
            🌅 **КликХак: Свежий IT-дайджест готов!**
            
            ИИ проанализировал новости за последние 24 часа. Готовый пост в прикрепленном файле.

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
